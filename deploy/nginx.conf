# /etc/nginx/sites-available/ficussword.top
# Nginx получает трафик от Xray fallback на порту 8080 (plain HTTP внутри)

server {
    listen 8080;
    server_name ficussword.top www.ficussword.top;

    root /var/www/ficussword/frontend;
    index index.html;

    # Фронт (React SPA — все маршруты на index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # C# бэк
    location /api/ {
        proxy_pass http://127.0.0.1:5097;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Node.js (Kodik proxy) — перехватываем до /api/ чтобы не попасть в C# бэк
    location /api/anime/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3x-ui панель (с поддержкой WebSocket для live-логов)
    location /xui/ {
        proxy_pass http://127.0.0.1:54321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Статика — кэш на 30 дней
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

# Редирект HTTP → HTTPS (порт 80)
server {
    listen 80;
    server_name ficussword.top www.ficussword.top;
    return 301 https://$host$request_uri;
}
